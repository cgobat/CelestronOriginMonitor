name: Build Linux deb package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            dpkg-dev \
            fakeroot \
            libstellarsolver-dev \
            libqt5websockets5-dev \
            ninja-build \
            pkg-config \
            qtbase5-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Build Debian package
        run: cpack --config build/CPackConfig.cmake -G DEB

      - name: Relax StellarSolver runtime dependency
        run: |
          bash packaging/relax-stellarsolver-dep.sh ./*.deb
          dpkg-deb -f ./*.deb Depends

      - name: Upload Debian package
        uses: actions/upload-artifact@v7
        with:
          name: celestron-origin-monitor-deb
          path: ./*.deb
          if-no-files-found: error
